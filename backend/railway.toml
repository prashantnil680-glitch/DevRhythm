[build]
builder = "nixpacks"
watch = ["package.json", "src/**"]

[deploy]
healthcheckPath = "/api/v1/health"
healthcheckTimeout = 30
# Remove restartPolicyType unless you specifically need it
# restartPolicyType = "on-failure"

[build.buildPhase]
command = "npm install"

[build.startPhase]
command = "npm start"

[environment]
NODE_ENV = "production"
PORT = "5000"

[[services]]
name = "devrhythm-backend"
port = 5000
cpu = { limit = "0.5" }
memory = { limit = "512" }

[services.checks.http]
path = "/api/v1/health"
interval = "10s"
timeout = "5s"
initialDelay = "10s"
